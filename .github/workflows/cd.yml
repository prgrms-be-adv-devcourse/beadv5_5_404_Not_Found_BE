name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            eureka-server:
              - 'eureka-server/**'
            gateway-service:
              - 'gateway-service/**'
            member-service:
              - 'member-service/**'
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'
            settlement-service:
              - 'settlement-service/**'

      - name: Set services to deploy
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICES='["eureka-server","gateway-service","member-service","product-service","order-service","payment-service","settlement-service"]'
          else
            SERVICES='${{ steps.filter.outputs.changes }}'
          fi
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          if [ "$SERVICES" = "[]" ] || [ -z "$SERVICES" ]; then
            echo "any=false" >> $GITHUB_OUTPUT
          else
            echo "any=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bookcommerce-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /home/ec2-user/app
            git pull origin main
            bash scripts/deploy.sh '${{ needs.detect-changes.outputs.services }}'
