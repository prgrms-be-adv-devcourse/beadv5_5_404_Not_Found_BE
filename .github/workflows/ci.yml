name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bookcommerce
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build
        env:
          DB_URL: jdbc:postgresql://localhost:5432/bookcommerce
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-minimum-32-chars
          INTERNAL_SECRET_KEY: test-internal-secret
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: adminpassword
          PAYMENT_ENCRYPTION_KEY: test-payment-encryption-key-32chars
          TOSS_CLIENT_KEY: test_client_key
          TOSS_SECRET_KEY: test_secret_key
          TOSS_SUCCESS_URL: http://localhost/success
          TOSS_FAIL_URL: http://localhost/fail
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
