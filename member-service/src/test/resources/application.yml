server:
  port: 0

spring:
  application:
    name: member-service-test
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookcommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET_KEY:your_jwt_secret_key}
  access-expiration: 1800000
  refresh-expiration: 1209600000

eureka:
  client:
    enabled: false

internal:
  secret: ${INTERNAL_SECRET_KEY:your_internal_service_secret_key}
  secret-key: ${INTERNAL_SECRET_KEY:your_internal_service_secret_key}
