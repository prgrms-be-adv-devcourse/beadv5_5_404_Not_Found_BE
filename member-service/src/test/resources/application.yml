server:
  port: 0

spring:
  application:
    name: member-service-test
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookcommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:test1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET_KEY:my-super-secret-jwt-key-that-is-at-least-32-bytes-long}
  access-expiration: 1800000
  refresh-expiration: 1209600000

eureka:
  client:
    enabled: false

internal:
  secret: test-internal-secret
  secret-key: test-internal-secret
