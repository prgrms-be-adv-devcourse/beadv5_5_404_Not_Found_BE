server:
  port: 8081

spring:
  application:
    name: member-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 2592000000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
