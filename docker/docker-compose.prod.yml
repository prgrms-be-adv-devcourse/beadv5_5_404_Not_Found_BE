services:
  postgres:
    image: postgres:16
    container_name: bookcommerce-postgres
    environment:
      POSTGRES_DB: bookcommerce
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d bookcommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookcommerce-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bookcommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bookcommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bookcommerce-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - bookcommerce-network

  eureka-server:
    image: ghcr.io/${GHCR_OWNER}/eureka-server:${IMAGE_TAG:-latest}
    container_name: bookcommerce-eureka
    ports:
      - "8761:8761"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookcommerce-network

  gateway-service:
    image: ghcr.io/${GHCR_OWNER}/gateway-service:${IMAGE_TAG:-latest}
    container_name: bookcommerce-gateway
    ports:
      - "80:8080"
    env_file:
      - ../.env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - bookcommerce-network

  member-service:
    image: ghcr.io/${GHCR_OWNER}/member-service:${IMAGE_TAG:-latest}
    container_name: bookcommerce-member
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookcommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - bookcommerce-network

  product-service:
    image: ghcr.io/${GHCR_OWNER}/product-service:${IMAGE_TAG:-latest}
    container_name: bookcommerce-product
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookcommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - bookcommerce-network

  order-service:
    image: ghcr.io/${GHCR_OWNER}/order-service:${IMAGE_TAG:-latest}
    container_name: bookcommerce-order
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookcommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - bookcommerce-network

  payment-service:
    image: ghcr.io/${GHCR_OWNER}/payment-service:${IMAGE_TAG:-latest}
    container_name: bookcommerce-payment
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookcommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - bookcommerce-network

  settlement-service:
    image: ghcr.io/${GHCR_OWNER}/settlement-service:${IMAGE_TAG:-latest}
    container_name: bookcommerce-settlement
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookcommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - bookcommerce-network


volumes:
  postgres-data:

networks:
  bookcommerce-network:
    driver: bridge
