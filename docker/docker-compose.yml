services:
  postgres:
    image: postgres:16
    container_name: bookcommerce-postgres
    environment:
      POSTGRES_DB: bookcommerce
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d bookcommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ..
      dockerfile: eureka-server/Dockerfile
    container_name: bookcommerce-eureka
    ports:
      - "8761:8761"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
