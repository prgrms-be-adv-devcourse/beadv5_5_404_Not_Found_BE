server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

internal:
  secret: ${INTERNAL_SECRET_KEY}

springdoc:
  override-server-url: http://43.200.75.98/api/product
  swagger-ui:
    path: /swagger-ui/index.html
    config-url: /product/v3/api-docs/swagger-config
    url: /product/v3/api-docs
  api-docs:
    path: /v3/api-docs
